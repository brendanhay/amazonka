name: build

# See: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#concurrency.
concurrency:
  group: ${{ github.head_ref }}-${{ github.workflow }}

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - synchronize

  push:
    branches: [ main ]
    paths-ignore:
      - "configs/**"
      - "scripts/**"
      - ".envrc"
      - ".gitignore"
      - "LICENSE"
      - "**.md"

jobs:
  amazonka-gen:
    runs-on: ubuntu-latest

    steps:
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
            extra-substituters = https://cache.iog.io
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: amazonka
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: actions/checkout@v6

      - run: nix build

  amazonka-lib:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ghc: ghc96 # Latest mainline GHC
          - os: ubuntu-latest
            ghc: ghc94 # Most industrially-relevant GHC
          - os: ubuntu-latest
            ghc: ghc90 # Catch errors due to simplified subsumption

          - os: macos-latest
            ghc: ghc94

    runs-on: ${{ matrix.os }}

    steps:
      - if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |-
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt &

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
            extra-substituters = https://cache.iog.io
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: amazonka
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: actions/checkout@v6

      - name: cabal update && cabal freeze
        run: |
          nix develop '.#${{matrix.ghc}}' --print-build-logs --command \
              bash -c 'cabal update && cabal freeze'

      - uses: actions/cache@v5
        with:
          key: v1-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ matrix.ghc }}-
          path: |
            ~/.cabal/store
            dist-newstyle

      - name: cabal build core
        run: |
          nix develop '.#${{matrix.ghc}}' --print-build-logs --command \
              bash -c 'cabal build amazonka-core amazonka'

      - name: cabal build s3-encryption
        run: |
          nix develop '.#${{matrix.ghc}}' --print-build-logs --command \
              bash -c 'cabal build amazonka-s3-encryption'

      - name: cabal build all
        run: |
          nix develop '.#${{matrix.ghc}}' --print-build-logs --command \
              bash -c 'cabal test all'
